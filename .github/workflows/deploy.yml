name: Deploy to OVH via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ovh-ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: FTP sync to OVH (cluster151)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: ./
          local-dir: ./
          dangerous-clean-slate: false
          log-level: minimal
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/_build/**
            **/.gitignore
            **/.claude/**
            **/CLAUDE.md
            **/README*.md
            **/_redirects
